type: charm
name: mariadb-k8s
title: MariaDB K8s Operator
summary: Deploys and manages MariaDB 10.6 on Kubernetes.
links:
  documentation: https://discourse.charmhub.io
  issues:
    https://github.com/canonical/mariadb-k8s-operator/issues
  source: https://github.com/canonical/mariadb-k8s-operator
  contact: https://launchpad.net/~canonical-is-devops

description: |
  A Kubernetes charm that deploys MariaDB 10.6 via Pebble.

  After deployment the unit reaches active/idle immediately, ready to
  accept ``database`` relation requests from consumer charms (e.g.
  frappe-hrms-k8s). On each request the charm creates a dedicated
  MariaDB database and user, then writes the credentials back to the
  relation so the consumer can connect.

  The charm uses the ``mysql_client`` interface, compatible with the
  data-platform-libs ``DatabaseRequires``/``DatabaseProvides`` libraries.

base: ubuntu@22.04
platforms:
  amd64:

parts:
  charm:
    source: .
    plugin: uv
    build-snaps:
      - astral-uv

containers:
  mariadb:
    resource: mariadb-image

resources:
  mariadb-image:
    type: oci-image
    description: MariaDB 10.6 OCI image (built from rockcraft.yaml in this repo)

storage:
  database:
    type: filesystem
    location: /var/lib/mysql
    minimum-size: 1G

provides:
  database:
    interface: mysql_client

peers:
  mariadb-peers:
    interface: mariadb-peers

config:
  options:
    mysql-root-password:
      type: string
      default: ""
      description: |
        Optional: override the auto-generated root password.
        Leave empty (default) to have the charm generate a secure random
        password on first deployment. Changing this value after the
        initial deployment has no effect; the password stored in the
        Juju secret is used instead.
